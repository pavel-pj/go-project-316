name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main,dev]

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'
        
    - name: Download dependencies
      run: |
        go mod download
        go mod verify
        
    - name: Run tests 
      run: make test

 
 
